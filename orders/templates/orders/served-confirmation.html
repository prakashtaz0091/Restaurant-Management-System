<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm </title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <div>
                    <h1 class="text-3xl font-bold text-slate-900">
                        Waiter's Panel
                    </h1>

                    <div class="mt-1 text-sm text-slate-500">
                        {{ request.user.first_name }} {{ request.user.last_name }}
                        <span class="mx-2">•</span>
                        {{ request.user.get_role_display }}
                    </div>
                </div>

                <a href="{% url 'logout_view_url' %}"
                    class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white font-medium transition">
                    Logout
                </a>

            </div>

        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">

        <!-- Messages -->
        {% if messages %}
        <div class="mb-6 space-y-3">
            {% for message in messages %}
            <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Station Grid -->
        <div class="flex justify-center">


            <section class="lg:w-[50%]  bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

                <!-- Station Header -->
                <div class="px-5 py-4 bg-slate-900 text-white flex items-center justify-between">
                    <h2 class="font-bold text-lg">
                        Order Item Confirm Serve
                    </h2>

                </div>

                <div class="p-4">
                    <h1 class="text-xl my-2">Confirm <i>{{ order_item }}</i> has been served ?</h1>
                    <hr>
                    <div class=" flex gap-3 items-center mt-3">
                        <form action="" method="post">
                            {% csrf_token %}
                            <input type="hidden" name="order_id" value="{{order_item.id}}">
                            <button class="py-2 px-3 bg-green-500 rounded-lg text-gray-50 font-semibold hover:bg-green-700" type="submit">Yes, I confirm</button>
                        </form>
                    </div>

                   
                </div>

            </section>


        </div>
    </main>

</body>
</html>
